  <body style="margin: 0; padding: 0; background: #0a0a0a;">
    <div id="root"></div>
    
    <!-- Loading screen - removed when React mounts -->
    <div id="loading-screen" style="
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    ">
      <!-- Ambient brand glow -->
      <div style="
        position: absolute;
        width: 360px;
        height: 360px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(232,106,51,0.12) 0%, transparent 70%);
        pointer-events: none;
      "></div>
      
      <!-- Logo/Brand -->
      <div style="
        font-size: 2.75rem;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 2rem;
        letter-spacing: -0.02em;
      ">
        Pitch<span style="
          background: linear-gradient(135deg, #E86A33 0%, #F2A93B 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        ">IQ</span>
      </div>
      
      <!-- Loading spinner -->
      <div style="position: relative; width: 44px; height: 44px;">
        <div style="
          position: absolute;
          inset: 0;
          border: 3px solid rgba(232,106,51,0.18);
          border-radius: 50%;
        "></div>
        <div style="
          position: absolute;
          inset: 0;
          border: 3px solid transparent;
          border-top-color: #E86A33;
          border-right-color: #F2A93B;
          border-radius: 50%;
          animation: piq-spin 0.9s linear infinite;
        "></div>
      </div>
      
      <style>
        @keyframes piq-spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    
    <script>
      // Wake up backend immediately to prevent cold start delays
      (function() {
        const backendUrl = window.location.hostname === 'localhost' ? '' : 'https://pitchiq-8enf.onrender.com';
        if (backendUrl) {
          console.log('🌅 Waking up backend...');
          fetch(backendUrl + '/api/health', {
            method: 'GET',
            mode: 'no-cors', // Don't wait for response
            credentials: 'omit'
          }).catch(() => {}); // Ignore errors - this is just a wake-up call
        }
      })();

      // Remove loading screen when React mounts
      (() => {
        let removed = false;
        const hideLoadingScreen = () => {
          if (removed) return;
          removed = true;
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.3s ease-out';
            setTimeout(() => loadingScreen.remove(), 300);
          }
        };

        const root = document.getElementById('root');
        // React's module script is deferred and may mount before this script's
        // DOMContentLoaded listener ever fires, so check immediately first.
        if (root && root.children.length > 0) {
          hideLoadingScreen();
        } else if (root) {
          const observer = new MutationObserver(() => {
            if (root.children.length > 0) {
              hideLoadingScreen();
              observer.disconnect();
            }
          });
          observer.observe(root, { childList: true });
        }
      })();
    </script>
