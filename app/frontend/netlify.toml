[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/deepgram/token"
  to = "/.netlify/functions/deepgram-key"
  status = 200

[[redirects]]
  from = "/api/cartesia/token"
  to = "/.netlify/functions/cartesia-key"
  status = 200

[[redirects]]
  from = "/api/openai/chat"
  to = "/.netlify/functions/openai-chat"
  status = 200

[[redirects]]
  from = "/api/openai/classify"
  to = "/.netlify/functions/openai-chat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
  NODE_VERSION = "18"
  VITE_API_BASE_URL = "https://pitchiq-8enf.onrender.com"
